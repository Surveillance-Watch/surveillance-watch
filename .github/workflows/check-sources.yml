name: check-sources

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC (weekly check)
  workflow_dispatch:        # manual "Run workflow" button for testing

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # binary packages = fast installs

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::rvest
            any::xml2
            any::jsonlite
            any::dplyr
            any::purrr
            any::readr
            any::stringr
            any::tibble
            any::knitr
            any::rmarkdown

      - name: Run source check
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: Rscript R/run_check.R

      - name: Commit updated data
        run: |
          git config user.name "surveillance-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly check: $(date -u +%F)"
          git push

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
